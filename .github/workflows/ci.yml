name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  linux-test:
    runs-on: Large-Linux-x64-16-64-for-intellij-aspect-public

    steps:
    - name: Checkout code
      uses: actions/checkout@v6

    - name: Setup Bazel
      uses: bazel-contrib/setup-bazel@0.18.0
      with:
        bazelisk-cache: true
        disk-cache: ${{ github.workflow }}-linux
        repository-cache: true

    - name: Build all targets
      run: bazel build //... --//testing/rules:max_servers=2 --//testing/rules:repo_cache=~/.cache/bazel-repo --execution_log_binary_file="${{ runner.temp }}/build_exec.log"

    - name: Test all targets
      run: bazel test //... --test_output=errors --//testing/rules:max_servers=2 --//testing/rules:repo_cache=~/.cache/bazel-repo --execution_log_binary_file="${{ runner.temp }}/test_exec.log"

    - name: Upload execution logs
      if: always()
      uses: actions/upload-artifact@v7
      with:
        name: linux-execution-logs
        path: |
          ${{ runner.temp }}/build_exec.log
          ${{ runner.temp }}/test_exec.log

  macos-test:
    runs-on: Large-macOS-arm64-5-14-for-intellij-aspect-public

    steps:
    - name: Checkout code
      uses: actions/checkout@v6

    - name: Setup Bazel
      uses: bazel-contrib/setup-bazel@0.18.0
      with:
        bazelisk-cache: true
        disk-cache: ${{ github.workflow }}-macos
        repository-cache: true

    - name: Build all targets
      run: bazel build //... --//testing/rules:max_servers=2 --//testing/rules:repo_cache=~/.cache/bazel-repo --execution_log_binary_file="${{ runner.temp }}/build_exec.log"

    - name: Test all targets
      run: bazel test //... --test_output=errors --//testing/rules:max_servers=2 --//testing/rules:repo_cache=~/.cache/bazel-repo --execution_log_binary_file="${{ runner.temp }}/test_exec.log"

    - name: Upload execution logs
      if: always()
      uses: actions/upload-artifact@v7
      with:
        name: macos-execution-logs
        path: |
          ${{ runner.temp }}/build_exec.log
          ${{ runner.temp }}/test_exec.log

  windows-test:
    runs-on: windows-latest

    steps:
    - name: Configure Git line endings
      run: git config --global core.autocrlf input

    - name: Checkout code
      uses: actions/checkout@v6

    - name: Setup MSYS2
      id: msys2
      uses: msys2/setup-msys2@v2

    - name: Setup Bazel
      uses: bazel-contrib/setup-bazel@0.18.0
      with:
        bazelisk-cache: true
        disk-cache: ${{ github.workflow }}-windows
        repository-cache: true

    - name: Build all targets
      env:
        BAZEL_SH: ${{ steps.msys2.outputs.msys2-location }}\usr\bin\bash.exe
      run: bazel build //... --//testing/rules:repo_cache=~/.cache/bazel-repo --execution_log_binary_file="${{ runner.temp }}/build_exec.log"

    - name: Test all targets
      env:
        BAZEL_SH: ${{ steps.msys2.outputs.msys2-location }}\usr\bin\bash.exe
      run: bazel test //... --test_output=errors --//testing/rules:repo_cache=~/.cache/bazel-repo --execution_log_binary_file="${{ runner.temp }}/test_exec.log"

    - name: Upload execution logs
      if: always()
      uses: actions/upload-artifact@v7
      with:
        name: windows-execution-logs
        path: |
          ${{ runner.temp }}/build_exec.log
          ${{ runner.temp }}/test_exec.log

  format-check:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Bazel
      uses: bazel-contrib/setup-bazel@0.18.0
      with:
        bazelisk-cache: true
        repository-cache: true

    - name: Check formatting
      run: bazel run //tools/format:format.check

  license-check:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v6

    - name: Check License Header
      uses: apache/skywalking-eyes/header@v0.8.0
      with:
        mode: check
