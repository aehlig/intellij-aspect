syntax = "proto3";

import "sdk/proto/ide_info.proto";

option java_outer_classname = "FixtureProto";
option java_package = "com.intellij.aspect.testing.rules.fixture";

message BazelModule {
  string name = 1;
  string version = 2;
  string config = 3;
  repeated string flags = 4;
}

enum AspectDeployment {
  BCR = 0;
  MATERIALIZED = 1;
  BUILTIN = 2;
}

enum RuleSet {
    CC = 0;
    PYTHON = 1;
    JAVA = 2;
    KOTLIN = 3;
    SCALA = 4;
    GO = 5;
    PROTO = 6;
    LEGACY_RULES_PROTO = 7;
}

message TestConfig {
  repeated BazelModule modules = 1;
  repeated RuleSet rule_sets = 2;
  AspectDeployment aspect_deployment = 3;
  string bazel_version = 4;
}

message OutputGroup {
  string name = 1;
  repeated string files = 2;
}

message Metrics {
  int64 skyframeNodeCount = 1;
  int64 evaluatedConfiguredTarget = 2;
  int64 evaluatedArtifactNestedSet = 3;
  int64 usedHeapSizeAfterGc = 4;
}

message TestFixture {
  TestConfig config = 1;
  repeated TargetIdeInfo targets = 2;
  repeated OutputGroup outputs = 3;
  repeated string extra_flags = 4;
  Metrics metrics = 5;
}
